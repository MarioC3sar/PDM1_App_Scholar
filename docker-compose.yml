services:
  db:
    image: postgres:16-alpine
    container_name: appscholar-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: scholar_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d scholar_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: appscholar-backend
    restart: unless-stopped
    command: sh -c "npx prisma migrate deploy && npx prisma generate && npm run dev"
    working_dir: /app/backend
    ports:
      - "3001:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:123456@db:5432/scholar_db?schema=public
      JWT_SECRET: appscholar-secret
    volumes:
      - ./backend:/app/backend
      - /app/backend/node_modules
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
